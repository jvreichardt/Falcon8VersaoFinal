
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
textarea { width: 100%; height: 260px; font-family: var(--font-mono); font-size: 13px; padding: 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); resize: vertical; }
.out { height: 260px; overflow-y: auto; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); padding: 10px; font-size: 13px; font-family: var(--font-mono); }
.label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; font-family: var(--font-sans); }
button { padding: 8px 20px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; font-size: 14px; margin-right: 8px; }
button:hover { background: var(--color-background-secondary); }
.err { color: #E24B4A; font-size: 12px; }
.ok { color: #1D9E75; }
.line-out { display: flex; gap: 12px; padding: 2px 0; border-bottom: 0.5px solid var(--color-border-tertiary); align-items: baseline; }
.addr { color: var(--color-text-tertiary); min-width: 36px; }
.hex-val { color: #185FA5; font-weight: 500; min-width: 80px; }
.asm-txt { color: var(--color-text-secondary); font-size: 11px; }
.rom-block { margin-top: 10px; padding: 8px; background: var(--color-background-primary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); word-break: break-all; font-size: 12px; color: var(--color-text-primary); line-height: 1.8; font-family: var(--font-mono); }
</style>

<div class="wrap">
  <div style="margin-bottom:12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <button onclick="assemble()">Montar</button>
    <button onclick="downloadHex()">Baixar .hex</button>
    <button onclick="copyRom()" style="font-size:13px; padding:8px 14px;">Copiar ROM</button>
    <span id="status" style="font-size:13px; font-family:var(--font-sans);"></span>
  </div>

  <div class="row">
    <div>
      <div class="label">Assembly Falcon-8</div>
      <textarea id="asm" spellcheck="false"></textarea>
    </div>
    <div>
      <div class="label">Saída — endereço byte / high byte / low byte / instrução</div>
      <div class="out" id="out"></div>
    </div>
  </div>

  <div class="label">ROM 256x8 (v2.0 raw — cada instrução = 2 bytes)</div>
  <div class="rom-block" id="rom">Monte o programa para ver a ROM</div>
</div>

<script>
const REGS = {R0:0,R1:1,R2:2,R3:3,R4:4,R5:5,R6:6,R7:7};
function reg(s){ s=s.trim().toUpperCase(); if(REGS[s]===undefined) throw `Registrador inválido: ${s}`; return REGS[s]; }
function signedImm(v,bits){ const min=-(1<<(bits-1)),max=(1<<(bits-1))-1; if(v<min||v>max) throw `Imediato ${v} fora do range [${min},${max}]`; return v&((1<<bits)-1); }
function encode(type,fields){
  let w=0;
  if(type==='R'){const{op,rd,rs1,rs2,fn}=fields;w=(op<<12)|(rd<<9)|(rs1<<6)|(rs2<<3)|fn;}
  else if(type==='I'){const{op,rd,rs1,imm}=fields;w=(op<<12)|(rd<<9)|(rs1<<6)|(signedImm(imm,6)&63);}
  else if(type==='S'){const{op,rs2,rs1,off}=fields;w=(op<<12)|(rs2<<9)|(rs1<<6)|(signedImm(off,6)&63);}
  else if(type==='B'){const{op,rs1,rs2,off}=fields;w=(op<<12)|(rs1<<9)|(rs2<<6)|(signedImm(off,6)&63);}
  else if(type==='J'){const{op,rd,off}=fields;w=(op<<12)|(rd<<9)|(off&511);}
  return w&0xFFFF;
}
function parseMemRef(s){ s=s.trim(); const m=s.match(/^(-?\d+)\((\w+)\)$/); if(!m) throw `Formato inválido: ${s}`; return{off:parseInt(m[1]),base:reg(m[2])}; }

let lastRom='';

function assemble(){
  const src=document.getElementById('asm').value;
  const lines=src.split('\n');
  const tokens=[]; const labels={};
  for(let l of lines){
    const s=l.replace(/[;#].*$/,'').trim();
    if(!s) continue;
    if(s.endsWith(':')){ labels[s.slice(0,-1).toUpperCase()]=tokens.length; continue; }
    const lm=s.match(/^(\w+):\s*(.+)$/);
    if(lm){ labels[lm[1].toUpperCase()]=tokens.length; tokens.push(lm[2].trim()); }
    else tokens.push(s);
  }
  const results=[]; const errors=[];
  for(let i=0;i<tokens.length;i++){
    const t=tokens[i]; const addr=i*2;
    try{
      const parts=t.split(/[\s,]+/).filter(Boolean);
      const mnem=parts[0].toUpperCase();
      let word=0;
      if(mnem==='ADD')  word=encode('R',{op:0,rd:reg(parts[1]),rs1:reg(parts[2]),rs2:reg(parts[3]),fn:0});
      else if(mnem==='SUB')  word=encode('R',{op:0,rd:reg(parts[1]),rs1:reg(parts[2]),rs2:reg(parts[3]),fn:1});
      else if(mnem==='AND')  word=encode('R',{op:0,rd:reg(parts[1]),rs1:reg(parts[2]),rs2:reg(parts[3]),fn:2});
      else if(mnem==='OR')   word=encode('R',{op:0,rd:reg(parts[1]),rs1:reg(parts[2]),rs2:reg(parts[3]),fn:3});
      else if(mnem==='SLT')  word=encode('R',{op:0,rd:reg(parts[1]),rs1:reg(parts[2]),rs2:reg(parts[3]),fn:4});
      else if(mnem==='SLL')  word=encode('R',{op:0,rd:reg(parts[1]),rs1:reg(parts[2]),rs2:reg(parts[3]),fn:5});
      else if(mnem==='SRL')  word=encode('R',{op:0,rd:reg(parts[1]),rs1:reg(parts[2]),rs2:reg(parts[3]),fn:6});
      else if(mnem==='ADDI') word=encode('I',{op:1,rd:reg(parts[1]),rs1:reg(parts[2]),imm:parseInt(parts[3])});
      else if(mnem==='LW'){  const{off,base}=parseMemRef(parts.slice(2).join('')); word=encode('I',{op:2,rd:reg(parts[1]),rs1:base,imm:off}); }
      else if(mnem==='SLLI') word=encode('I',{op:7,rd:reg(parts[1]),rs1:reg(parts[2]),imm:parseInt(parts[3])});
      else if(mnem==='SW'){  const{off,base}=parseMemRef(parts.slice(2).join('')); word=encode('S',{op:3,rs2:reg(parts[1]),rs1:base,off}); }
      else if(mnem==='BEQ'||mnem==='BNE'||mnem==='BLT'){
        const op=mnem==='BEQ'?4:mnem==='BNE'?5:8;
        const raw=parts[3];
        const offVal=labels[raw.toUpperCase()]!==undefined?(labels[raw.toUpperCase()]*2-addr)/2:parseInt(raw);
        word=encode('B',{op,rs1:reg(parts[1]),rs2:reg(parts[2]),off:offVal});
      }
      else if(mnem==='JAL'){
        const raw=parts[2];
        const offVal=labels[raw.toUpperCase()]!==undefined?(labels[raw.toUpperCase()]*2-addr)/2:parseInt(raw);
        if(offVal<0||offVal>511) throw `offset JAL fora do range 9bits`;
        word=encode('J',{op:6,rd:reg(parts[1]),off:offVal});
      }
      else throw `Instrução desconhecida: ${mnem}`;
      results.push({addr,word,src:t});
    } catch(e){ errors.push(`Linha ${i+1}: ${e}`); results.push({addr,word:null,src:t,err:String(e)}); }
  }

  const outEl=document.getElementById('out');
  outEl.innerHTML=results.map(r=>{
    const addrStr='0x'+r.addr.toString(16).padStart(2,'0').toUpperCase();
    if(r.word===null) return `<div class="line-out"><span class="addr">${addrStr}</span><span class="err">ERRO: ${r.err}</span></div>`;
    const hi=(r.word>>8)&0xFF; const lo=r.word&0xFF;
    const hiStr=hi.toString(16).padStart(2,'0');
    const loStr=lo.toString(16).padStart(2,'0');
    return `<div class="line-out"><span class="addr">${addrStr}</span><span class="hex-val">${hiStr} ${loStr}</span><span class="asm-txt">${r.src}</span></div>`;
  }).join('');

  const good=results.filter(r=>r.word!==null);
  // Gera bytes: cada instrução vira 2 bytes (big-endian: high byte primeiro)
  const bytes=[];
  for(const r of good){ bytes.push((r.word>>8)&0xFF); bytes.push(r.word&0xFF); }
  lastRom='v2.0 raw\n'+bytes.map(b=>b.toString(16).padStart(2,'0')).join(' ');
  document.getElementById('rom').textContent=lastRom;

  if(errors.length>0){
    document.getElementById('status').innerHTML=`<span class="err">${errors.length} erro(s)</span>`;
  } else {
    document.getElementById('status').innerHTML=`<span class="ok">${good.length} instruções → ${bytes.length} bytes</span>`;
  }
}

function downloadHex(){ if(!lastRom) assemble(); const blob=new Blob([lastRom],{type:'text/plain'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='programa.hex'; a.click(); URL.revokeObjectURL(url); document.getElementById('status').innerHTML='<span class="ok">Baixado!</span>'; }
function copyRom(){ navigator.clipboard.writeText(lastRom).then(()=>{ document.getElementById('status').innerHTML='<span class="ok">Copiado!</span>'; }); }

assemble();
</script>
